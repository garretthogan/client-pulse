services:
  postgres:
    image: postgres:16-alpine
    container_name: clientpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clientpulse
      POSTGRES_USER: clientpulse
      POSTGRES_PASSWORD: clientpulse
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientpulse -d clientpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
