name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace client
      - run: npm run build --workspace client

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema server/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://clientpulse:clientpulse@localhost:5433/clientpulse?schema=public
          DIRECT_URL: postgresql://clientpulse:clientpulse@localhost:5433/clientpulse?schema=public
      - run: npm run test --workspace server
      - run: npm run build --workspace server
